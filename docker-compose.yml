version: "3.8"

# Two deployment modes:
#
# 1. On-demand OSRM (default, no pre-processing needed):
#      docker compose up -d backend frontend
#    The backend spawns temporary OSRM containers per-request.
#    Requires: Docker socket mounted into backend container.
#
# 2. Pre-built OSRM (faster routing, needs pre-processed data):
#      docker compose up -d
#    Uses the 'osrm' service with pre-processed state/region data.
#    Run ./web/osrm-setup.sh first to prepare the data.

services:
  # Optional: pre-built OSRM server for a whole region.
  # Only needed if you have pre-processed OSRM data.
  osrm:
    image: osrm/osrm-backend
    container_name: motorshed-osrm
    restart: unless-stopped
    profiles: ["prebuilt"]
    volumes:
      - ./web/osrm-data:/data
    command: osrm-routed --algorithm mld /data/california-latest.osrm
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    container_name: motorshed-backend
    restart: unless-stopped
    volumes:
      # Mount Docker socket so backend can spawn on-demand OSRM containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared temp dir — sibling OSRM containers mount from the host,
      # so the backend's temp files must be on a host-visible path.
      - /tmp/motorshed-osrm:/tmp/motorshed-osrm
    environment:
      # Leave OSRM_HOST empty for on-demand mode.
      # Set to http://osrm:5000 for pre-built mode.
      - OSRM_HOST=${OSRM_HOST:-}
      - OSRM_TMPDIR=/tmp/motorshed-osrm
      - DOCKER_HOST_ADDR=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    container_name: motorshed-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
